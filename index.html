<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cavaliere</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* video invisibile */
#bgvideo{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    pointer-events:none;
}

/* immagine sopra */
img{
    max-width:90%;
    max-height:90%;
    z-index:10;
}
</style>
</head>

<body>

<video id="bgvideo" autoplay muted loop playsinline preload="auto">
    <source src="cavaliere.mp4" type="video/mp4">
</video>

<img src="cavaliere.jpeg" alt="Cavaliere">

<script>
const video = document.getElementById("bgvideo");

// prova avvio video (muted)
video.play().catch(()=>{});

// attiva audio al primo gesto utente
function attivaAudio(){
    video.muted = false;
    video.play().catch(()=>{});
}

// serve per mobile + PC
document.addEventListener("click", attivaAudio, {once:true});
document.addEventListener("touchstart", attivaAudio, {once:true});
</script>

</body>
</html>
