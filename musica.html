<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
img {
  width: 90%;
  max-width: 600px;
}
video {
  width: 1px;
  height: 1px;
  opacity: 0;
  position: absolute;
}
</style>
</head>
<body>

<!-- IMMAGINE -->
<img src="cavaliere.jpeg" alt="Festa della Bruna">

<!-- AUDIO (video invisibile) -->
<video id="v" autoplay playsinline>
  <source src="cavaliere.mp3" type="audio/mpeg">
</video>

<script>
const v = document.getElementById('v');

function playAudio() {
  v.muted = false;
  v.play().catch(()=>{});
}

setTimeout(playAudio, 300);
document.addEventListener('touchstart', playAudio);
</script>

</body>
</html>
