<script>
  const audio = document.getElementById('player');

  // Primo tentativo
  audio.play().catch(() => {});

  // Tentativi ripetuti (Android + iPhone)
  let attempts = 0;
  const interval = setInterval(() => {
    attempts++;
    audio.play().catch(() => {});
    if (attempts > 50) clearInterval(interval);
  }, 80);

  // Rimuove mute dopo 300 ms
  setTimeout(() => {
    audio.muted = false;
    audio.play().catch(() => {});
  }, 300);
