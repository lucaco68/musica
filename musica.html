<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavaliere</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #bgvideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
    img {
      max-width: 90%;
      max-height: 90%;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- VIDEO INVISIBILE CHE FA PARTIRE L'AUDIO SU IPHONE -->
  <video id="bgvideo" autoplay playsinline muted loop>
    <source src="https://raw.githubusercontent.com/lucaco68/musica/main/WhatsApp%20Video%202026-06-30%20at%2012.14.12.mp4" type="video/mp4">
  </video>

  <!-- IMMAGINE DEL CAVALIERE -->
  <img src="https://raw.githubusercontent.com/lucaco68/musica/main/cavaliere.jpeg">

  <script>
    const v = document.getElementById('bgvideo');

    // Sblocca audio dopo avvio video
    v.muted = false;

    // Tentativi ripetuti per iPhone
    let tries = 0;
    const interval = setInterval(() => {
      tries++;
      v.play().catch(() => {});
      if (tries > 50) clearInterval(interval);
    }, 80);

    // Fallback su tocco
    document.body.addEventListener('touchstart', () => {
      v.muted = false;
      v.play().catch(() => {});
    });
  </script>

</body>
</html>
