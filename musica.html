<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musica Autoplay</title>

<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    img {
        width: 90%;
        max-width: 600px;
        height: auto;
    }

    /* Video invisibile ma presente */
    video {
        position: fixed;
        width: 1px;
        height: 1px;
        opacity: 0;
    }
</style>
</head>

<body>

    <!-- Immagine visibile -->
    <img src="cavaliere.jpeg" alt="Cavaliere">

    <!-- Video invisibile con audio incorporato -->
    <video id="v" playsinline webkit-playsinline muted>
        <source src="cavaliere.mp4" type="video/mp4">
    </video>

<script>
const v = document.getElementById("v");

// Tentativi ripetuti di autoplay
function tryPlay() {
    v.play().then(() => {
        console.log("Autoplay riuscito");
        setTimeout(() => { v.muted = false; }, 500);
    }).catch(() => {
        console.log("Autoplay bloccato, ritento...");
        setTimeout(tryPlay, 500);
    });
}

document.addEventListener("DOMContentLoaded", tryPlay);

// Sblocco audio su iPhone con primo tocco
document.addEventListener("touchstart", () => {
    v.muted = false;
    v.play();
}, { once: true });
</script>

</body>
</html>
