<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cavaliere</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Video invisibile (serve solo per l'audio) */
#bgvideo{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    pointer-events:none;
}

/* Immagine visibile */
img{
    max-width:90%;
    max-height:90%;
    position:relative;
    z-index:10;
    user-select:none;
    -webkit-user-drag:none;
}
</style>

</head>
<body>

<video
    id="bgvideo"
    autoplay
    muted
    loop
    playsinline
    preload="auto">

    <source src="https://raw.githubusercontent.com/lucaco68/musica/main/cavaliere.mp4" type="video/mp4">

    Il browser non supporta il video.
</video>

<img
    src="https://raw.githubusercontent.com/lucaco68/musica/main/cavaliere.jpeg"
    alt="Cavaliere">

<script>

const video = document.getElementById("bgvideo");

// Avvio del video muto
video.play().catch(()=>{});

// Attiva audio al primo click/tocco
function avviaAudio(){

    video.muted = false;

    video.play().then(()=>{
        console.log("Audio attivato");
    }).catch(err=>{
        console.log(err);
    });

}

// Primo click
document.addEventListener("click", avviaAudio, {once:true});

// Primo tocco
document.addEventListener("touchstart", avviaAudio, {once:true});

</script>

</body>
</html>
