<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavaliere - Festa della Bruna</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>
  <!-- IMMAGINE AL CENTRO -->
  <img src="https://raw.githubusercontent.com/lucaco68/musica/main/cavaliere.jpeg" alt="Cavaliere Festa della Bruna">

  <!-- AUDIO -->
  <audio id="player" autoplay loop playsinline>
    <source src="https://www.falegnameriacolacicco.it/wp-content/uploads/2026/06/WhatsApp-Audio-2026-06-27-at-09.29.49.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('player');

    // Tentativo iniziale
    audio.play().catch(() => {});

    // Tentativi ripetuti per sbloccare autoplay su mobile
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      audio.play().catch(() => {});
      if (attempts > 50) clearInterval(interval);
    }, 80);

    // Sblocca su tocco (necessario su iPhone/Android)
    document.body.addEventListener('touchstart', () => {
      audio.muted = false;
      audio.play().catch(() => {});
    });
  </script>
</body>
</html>
