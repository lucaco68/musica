!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cavaliere</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* immagine centrale */
img{
    max-width:90%;
    max-height:90%;
    user-select:none;
}
</style>
</head>

<body>

<img src="cavaliere.jpeg" alt="Cavaliere">

<!-- audio -->
<audio id="musica" loop preload="auto">
    <source src="cavaliere.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("musica");

// serve interazione utente per avviare audio
function avviaMusica(){
    audio.play().catch(()=>{});
}

// click + touch
document.addEventListener("click", avviaMusica, {once:true});
document.addEventListener("touchstart", avviaMusica, {once:true});
</script>

</body>
</html>
