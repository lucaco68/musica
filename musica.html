<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* IMMAGINE RESPONSIVE PER SMARTPHONE */
img {
  width: 100%;
  height: auto;
  max-width: 600px;
  object-fit: contain;
  display: block;
}

/* VIDEO INVISIBILE PER AUDIO IN LOOP */
video {
  width: 1px;
  height: 1px;
  opacity: 0;
  position: absolute;
}
</style>

</head>
<body>

<!-- IMMAGINE -->
<img src="cavaliere.jpeg" alt="Festa della Bruna">

<!-- AUDIO IN LOOP (video invisibile) -->
<video id="musica" autoplay loop playsinline muted>
  <source src="cavaliere.mp4" type="video/mp4">
</video>

<script>
const musica = document.getElementById('musica');

function playAudio() {
  musica.muted = false;
  musica.play().catch(()=>{});
}

setTimeout(playAudio, 300);
document.addEventListener('touchstart', playAudio);
</script>

</body>
</html>
